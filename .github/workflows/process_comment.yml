name: Process Interaction Comment

on:
  issue_comment:
    types: [created]

concurrency:
  group: readme-world-engine
  cancel-in-progress: false

jobs:
  process-comment:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
          
      # ── Restore state from output branch before running the engine ──────────
      #
      # artifact_manager reads from generated/state.json.
      # Pull the latest committed state from the output branch so interactions
      # accumulate correctly across runs.
      #
      - name: Restore state from output branch
        run: |
          mkdir -p generated
          git fetch origin output || true
          if git ls-remote --exit-code --heads origin output; then
            git show origin/output:state.json > generated/state.json 2>/dev/null \
              && echo "State restored from output branch." \
              || echo "No state.json on output branch yet — starting fresh."
          else
            echo "Output branch does not exist yet — starting fresh."
          fi

      - name: Process Comment Engine
        id: engine
        run: |
          python github_action_runner.py \
            "${{ github.event.comment.body }}" \
            "${{ github.event.comment.user.login }}" \
            "${{ github.repository_owner }}" \
            "${{ github.event.issue.number }}"
          
      - name: Commit and Push Changes
        if: steps.engine.outputs.should_commit == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stash generated artifacts
          cp generated/state.json /tmp/state.json
          cp generated/world.svg /tmp/world.svg
          
          # Fetch and checkout output branch — preserving existing history
          git fetch origin output || true
          if git ls-remote --exit-code --heads origin output; then
            git checkout -B output origin/output
          else
            git checkout --orphan output
          fi
          
          # Clear any tracked source files from the output branch workspace
          git rm -rf . || true
          
          # Restore artifacts to the root of the output branch
          cp /tmp/state.json ./state.json
          cp /tmp/world.svg ./world.svg
          
          git add state.json world.svg
          
          # Only commit if files actually changed
          if git diff --cached --quiet; then
            echo "No changes to commit — skipping."
          else
            git commit -m "chore(world): update from interaction by ${{ github.event.comment.user.login }}"
            
            # Retry push up to 3 times in case of transient network issues
            for i in 1 2 3; do
              git push origin HEAD:output && break || sleep 5
            done
          fi

      # ── Purge Camo image cache (safe, never fails) ─────────────────────────
      - name: Purge Camo image cache
        if: steps.engine.outputs.should_commit == 'true'
        run: |
          urls=$(curl -sLk "https://github.com/armaanjain-byte/readme-world/blob/main/README.md" \
            | grep -Eo "(http|https)://camo.githubusercontent.com[a-zA-Z0-9./?=_%:-]*" || true)
          if [ -n "$urls" ]; then
            echo "Purging Camo URLs:"
            echo "$urls"
            for url in $urls; do
              curl -sLk "$url" -o /dev/null || true
            done
          else
            echo "No Camo URLs found — skipping purge."
          fi
