name: Process Interaction Comment

on:
  issue_comment:
    types: [created]

jobs:
  process-comment:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Process Comment Engine
        id: engine
        run: |
          python github_action_runner.py \
            "${{ github.event.comment.body }}" \
            "${{ github.event.comment.user.login }}" \
            "${{ github.repository_owner }}" \
            "${{ github.event.issue.number }}"
            
      - name: Commit and Push Changes
        if: steps.engine.outputs.should_commit == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stash generated artifacts
          cp generated/state.json /tmp/state.json
          cp generated/world.svg /tmp/world.svg
          
          # Fetch and checkout output branch
          git fetch origin output || true
          if git ls-remote --exit-code --heads origin output; then
            git checkout -B output origin/output
          else
            git checkout --orphan output
          fi
          
          # Clear existing tracked files if it was an orphan branch or cleanly reset to root
          git rm -rf . || true
          
          # Restore artifacts to the root of the output branch
          cp /tmp/state.json ./state.json
          cp /tmp/world.svg ./world.svg
          
          git add state.json world.svg
          git commit -m "Update world state and SVG from comment interaction" || true
          git push origin HEAD:output

      - name: Purge Camo image cache
        uses: kevincobain2000/action-camo-purge@v1
