name: Update readme-world

on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate world.svg
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the default branch (where config & scripts live) ────────
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Ensure the output branch exists ─────────────────────────────────
      - name: Ensure output branch exists
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin output; then
            echo "OUTPUT_BRANCH_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "OUTPUT_BRANCH_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: Create orphan output branch (first run only)
        if: env.OUTPUT_BRANCH_EXISTS == 'false'
        run: |
          CURRENT_BRANCH=$(git symbolic-ref --short HEAD)

          git checkout --orphan output
          git rm -rf .
          echo "# readme-world output branch" > README.md
          echo "This branch is auto-managed by GitHub Actions. Do not edit manually." >> README.md
          git add README.md
          git commit -m "chore: initialise output branch"
          git push origin output

          git checkout "$CURRENT_BRANCH"

      # ── 5. Check out the output branch into a worktree ──────────────────────
      - name: Check out output branch into worktree
        run: |
          git fetch origin output
          git worktree add ./output-branch output

      # ── 6. Restore state.json from output branch into generated/ ────────────
      #
      # artifact_manager reads/writes from generated/, NOT the workspace root.
      # We must restore into generated/ so the engine picks up the existing state.
      #
      - name: Restore state.json from output branch
        run: |
          mkdir -p generated
          if [ -f ./output-branch/state.json ]; then
            cp ./output-branch/state.json ./generated/state.json
            echo "Restored existing state.json into generated/"
          else
            echo "No existing state.json — engine will initialize fresh."
          fi

      # ── 7. Run the generator ────────────────────────────────────────────────
      #
      # generate_world.py writes to generated/world.svg via artifact_manager.
      #
      - name: Generate world.svg and update state.json
        run: python generate_world.py

      # ── 8. Copy outputs from generated/ into the output branch worktree ─────
      - name: Copy outputs to output branch
        run: |
          cp generated/world.svg  ./output-branch/world.svg
          cp generated/state.json ./output-branch/state.json

      # ── 9. Commit & push to the output branch ───────────────────────────────
      - name: Commit and push outputs
        working-directory: ./output-branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add world.svg state.json

          # Only commit if there is something new to commit
          if git diff --cached --quiet; then
            echo "No changes to commit — skipping."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore(world): update world.svg [${TIMESTAMP}]"
            git push origin output
          fi

      # ── 10. Purge Camo / GitHub image proxy cache ───────────────────────────
      #
      # GitHub proxies raw.githubusercontent.com images through Camo.
      # The || true ensures this step never fails the workflow if no camo
      # URLs are found (e.g., first run before the image is ever viewed).
      #
      - name: Purge Camo image cache
        run: |
          urls=$(curl -sLk "https://github.com/armaanjain-byte/readme-world/blob/main/README.md" \
            | grep -Eo "(http|https)://camo.githubusercontent.com[a-zA-Z0-9./?=_%:-]*" || true)
          if [ -n "$urls" ]; then
            echo "Purging Camo URLs:"
            echo "$urls"
            for url in $urls; do
              curl -sLk "$url" -o /dev/null || true
            done
          else
            echo "No Camo URLs found — skipping purge."
          fi