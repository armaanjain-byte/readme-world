<g id="weather_rain" transform="scale(1)">
  <rect x="0" y="0" width="800" height="300" fill="#000000" opacity="0.1" />
  <!-- A repeating pattern of vertical lines simulating heavy rain.
       We scatter them widely across the 800x300 viewBox. -->
  <line x1="50" y1="-50" x2="30" y2="50" stroke="#aaccff" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="20" x2="130" y2="120" stroke="#aaccff" stroke-width="1.5" opacity="0.5"/>
  <line x1="250" y1="-20" x2="230" y2="80" stroke="#aaccff" stroke-width="2" opacity="0.6"/>
  <line x1="350" y1="50" x2="330" y2="150" stroke="#aaccff" stroke-width="1" opacity="0.4"/>
  <line x1="450" y1="-80" x2="430" y2="20" stroke="#aaccff" stroke-width="2" opacity="0.7"/>
  <line x1="550" y1="10" x2="530" y2="110" stroke="#aaccff" stroke-width="1.5" opacity="0.5"/>
  <line x1="650" y1="-40" x2="630" y2="60" stroke="#aaccff" stroke-width="2" opacity="0.6"/>
  <line x1="750" y1="60" x2="730" y2="160" stroke="#aaccff" stroke-width="1" opacity="0.4"/>
  
  <line x1="80" y1="80" x2="60" y2="180" stroke="#aaccff" stroke-width="1.5" opacity="0.5"/>
  <line x1="180" y1="-10" x2="160" y2="90" stroke="#aaccff" stroke-width="2" opacity="0.7"/>
  <line x1="280" y1="100" x2="260" y2="200" stroke="#aaccff" stroke-width="1" opacity="0.4"/>
  <line x1="380" y1="30" x2="360" y2="130" stroke="#aaccff" stroke-width="2" opacity="0.6"/>
  <line x1="480" y1="120" x2="460" y2="220" stroke="#aaccff" stroke-width="1.5" opacity="0.5"/>
  <line x1="580" y1="-30" x2="560" y2="70" stroke="#aaccff" stroke-width="2" opacity="0.7"/>
  <line x1="680" y1="90" x2="660" y2="190" stroke="#aaccff" stroke-width="1" opacity="0.4"/>
  <line x1="780" y1="10" x2="760" y2="110" stroke="#aaccff" stroke-width="2" opacity="0.6"/>
</g>