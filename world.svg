<svg width="100%" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" image-rendering="pixelated">

<style>
    /* Base animation properties */
    .anim-bounce, .anim-breathe, .anim-pace, .anim-shake, .anim-float, .anim-rain, .anim-snowfall, .anim-lightning, .anim-sway, .anim-blink {
        transform-box: fill-box;
        transform-origin: center;
    }

    /* Weather Animations */
    .anim-float {
        animation: float 20s linear infinite;
    }
    @keyframes float {
        0% { transform: translateX(0px); }
        50% { transform: translateX(30px); }
        100% { transform: translateX(0px); }
    }

    .anim-rain {
        animation: rain 1s linear infinite;
    }
    @keyframes rain {
        0% { transform: translateY(-50px); }
        100% { transform: translateY(50px); }
    }

    .anim-snowfall {
        animation: snowfall 5s linear infinite;
    }
    @keyframes snowfall {
        0% { transform: translate(0px, -50px); }
        50% { transform: translate(20px, 0px); }
        100% { transform: translate(-10px, 50px); }
    }

    .anim-lightning {
        animation: lightning 10s infinite;
    }
    @keyframes lightning {
        0%, 90%, 100% { opacity: 0; }
        92% { opacity: 1; }
        94% { opacity: 0; }
        96% { opacity: 0.8; }
        98% { opacity: 0; }
    }
    
    .anim-sway {
        animation: sway 4s ease-in-out infinite alternate;
    }
    @keyframes sway {
        0% { transform: rotate(-2deg); }
        100% { transform: rotate(2deg); }
    }

    .anim-blink {
        animation: blink 3s infinite;
    }
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
    }

    /* Pet Behavior Animations */
    .anim-bounce {
        animation: bounce 1s ease-in-out infinite;
    }
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }

    .anim-breathe {
        animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    .anim-pace {
        animation: pace 6s linear infinite;
    }
    @keyframes pace {
        0% { transform: translateX(0) scaleX(1); }
        25% { transform: translateX(40px) scaleX(1); }
        26% { transform: translateX(40px) scaleX(-1); } /* flip */
        75% { transform: translateX(-40px) scaleX(-1); }
        76% { transform: translateX(-40px) scaleX(1); } /* flip back */
        100% { transform: translateX(0) scaleX(1); }
    }

    .anim-shake {
        animation: shake 0.2s linear infinite;
    }
    @keyframes shake {
        0% { transform: translateX(-2px); }
        50% { transform: translateX(2px); }
        100% { transform: translateX(-2px); }
    }
</style>

<defs>
<g id="cat_happy" transform="scale(1.5)">
