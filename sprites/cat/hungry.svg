<g id="cat_hungry" transform="scale(1.5)">
  <!-- Tail rigid -->
  <path d="M 5 20 L 0 5" fill="none" stroke="#FFA07A" stroke-width="3" stroke-linecap="round"/>
  <!-- Body leaning forward -->
  <rect x="5" y="15" width="20" height="12" rx="5" fill="#FFA07A"/>
  <!-- Legs -->
  <rect x="8" y="25" width="3" height="5" rx="1" fill="#FFA07A"/>
  <rect x="20" y="25" width="3" height="5" rx="1" fill="#FFA07A"/>
  <!-- Head slightly lower -->
  <circle cx="28" cy="16" r="8" fill="#FFA07A"/>
  <!-- Ears pointed back -->
  <polygon points="23,10 27,12 20,6" fill="#E9967A"/>
  <polygon points="31,10 27,12 34,6" fill="#E9967A"/>
  <!-- Face (Hungry/Desperate) -->
  <ellipse cx="28" cy="18" rx="2" ry="3" fill="#333"/>
  <!-- Eyes wide -->
  <circle cx="25" cy="14" r="2" fill="#fff"/>
  <circle cx="25" cy="14" r="1" fill="#333"/>
  <circle cx="31" cy="14" r="2" fill="#fff"/>
  <circle cx="31" cy="14" r="1" fill="#333"/>
  <!-- Drool -->
  <path d="M 27 20 Q 28 24 27 26" fill="none" stroke="#87CEFA" stroke-width="1.5" stroke-linecap="round"/>
</g>