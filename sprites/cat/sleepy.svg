<g id="cat_sleepy" transform="scale(1.5)">
  <!-- Tail wrapped around -->
  <path d="M 5 25 Q 15 28 25 25" fill="none" stroke="#FFA07A" stroke-width="3" stroke-linecap="round"/>
  <!-- Body curled up -->
  <ellipse cx="15" cy="22" rx="12" ry="8" fill="#FFA07A"/>
  <!-- Head tucked -->
  <circle cx="22" cy="18" r="7" fill="#FFA07A"/>
  <!-- Ears -->
  <polygon points="18,13 22,15 19,8" fill="#E9967A"/>
  <polygon points="25,13 22,15 26,8" fill="#E9967A"/>
  <!-- Face (Sleepy / Eyes Closed) -->
  <path d="M 23 18 Q 24 19 25 18" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 27 18 Q 28 19 29 18" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="26" cy="20" r="1" fill="#FFC0CB"/>
  <!-- Zzz -->
  <text x="28" y="10" font-family="sans-serif" font-size="8" fill="#333" class="anim-float">Z</text>
  <text x="32" y="5" font-family="sans-serif" font-size="6" fill="#333" class="anim-float">z</text>
</g>