<g id="cat_scared" transform="scale(1.5)">
  <!-- Tail puffed and straight up -->
  <path d="M 5 20 L 5 2" fill="none" stroke="#FFA07A" stroke-width="6" stroke-linecap="round"/>
  <path d="M 5 20 L 5 2" fill="none" stroke="#E9967A" stroke-width="3" stroke-linecap="round" stroke-dasharray="1,2"/>
  <!-- Body arched -->
  <path d="M 5 25 Q 15 5 25 25" fill="none" stroke="#FFA07A" stroke-width="12" stroke-linecap="round"/>
  <!-- Legs straight -->
  <rect x="8" y="25" width="3" height="8" rx="1" fill="#FFA07A"/>
  <rect x="20" y="25" width="3" height="8" rx="1" fill="#FFA07A"/>
  <!-- Head lowered -->
  <circle cx="28" cy="22" r="8" fill="#FFA07A"/>
  <!-- Ears flat -->
  <polygon points="23,16 27,18 20,18" fill="#E9967A"/>
  <polygon points="31,16 27,18 34,18" fill="#E9967A"/>
  <!-- Face (Scared) -->
  <circle cx="25" cy="22" r="2.5" fill="#fff"/>
  <circle cx="25" cy="22" r="1" fill="#333"/>
  <circle cx="31" cy="22" r="2.5" fill="#fff"/>
  <circle cx="31" cy="22" r="1" fill="#333"/>
  <path d="M 27 25 Q 28 24 29 25" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
</g>